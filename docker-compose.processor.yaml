version: '3'
services:
  processor:
    build:
      context: .
      dockerfile: processor/Dockerfile
    network_mode: host
    # command: python -m debugpy --listen 0.0.0.0:5678 --wait-for-client -m processor.src.processor
    command: python -m processor.src.processor
    # Self-heal if the processor container crashes (e.g. OOM collateral kill
    # during a heavy ODM / treecover stage). Clean exits (exit 0 after finishing
    # a task) are not restarted, so the existing cron-based polling model is
    # preserved. Cap retries so a persistently broken container does not
    # thrash forever.
    restart: on-failure:5
    # Give the graceful-shutdown handler time to re-queue the in-flight task on a
    # deploy/restart (SIGTERM) before Docker escalates to SIGKILL. Without this,
    # the default 10s can expire mid-stage and a healthy job gets misclassified as
    # a crash. See _handle_graceful_shutdown in processor/src/processor.py.
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          # Per-host caps so the same compose file deploys on machines of
          # different sizes. Override in .env; PROCESSOR_CPU_LIMIT must be <= the
          # host's CPU core count. Defaults match the original production sizing.
          cpus: ${PROCESSOR_CPU_LIMIT:-30}
          memory: ${PROCESSOR_MEMORY_LIMIT:-96G}
    runtime: nvidia
    volumes:
      - ./processor:/app/processor
      - ./shared:/app/shared
      - ./assets:/app/assets
      - ~/.ssh/processing-to-storage:/tmp/ssh-keys/processing-to-storage:ro
      - ~/.ssh/processing-to-storage.pub:/tmp/ssh-keys/processing-to-storage.pub:ro
      # CRITICAL: Mount Docker socket for ODM processing (Docker-in-Docker)
      - /var/run/docker.sock:/var/run/docker.sock
      # Stable host identity for default processor worker IDs.
      - /etc/machine-id:/host/etc/machine-id:ro
      # Mount /data for processing directory access
      - /data:/data
    environment:
      BASE_DIR: /data
      # Persist the OpenCLIP weights on the /data mount (shared with the API) so
      # the ~3.9GB download happens once, not on every cron-recreated container.
      OPENCLIP_CACHE_DIR: /data/assets/openclip_cache
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      STORAGE_SERVER_IP: data2.deadtrees.earth
      STORAGE_SERVER_USERNAME: dendro
      STORAGE_SERVER_DATA_PATH: ${STORAGE_SERVER_DATA_PATH}
      PROCESSOR_USERNAME: processor@deadtrees.earth
      PROCESSOR_PASSWORD: ${PROCESSOR_PASSWORD}
      PROCESSOR_WORKER_ID: ${PROCESSOR_WORKER_ID:-}
      SSH_PRIVATE_KEY_PASSPHRASE: ${SSH_PRIVATE_KEY_PASSPHRASE}
      SSH_PRIVATE_KEY_PATH: /root/.ssh/processing-to-storage
      DEV_MODE: "false"
      ODM_AUTO_BOUNDARY: "true"
      ODM_SKY_REMOVAL: "true"
      # Service role key for accessing auth.users (user email lookup)
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      # Linear integration for processing failure notifications
      LINEAR_ENABLED: ${LINEAR_ENABLED:-false}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      # SSH_KEY_PATH: /root/.ssh/processing-to-storage
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "5678:5678"
    devices:
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia-modeset:/dev/nvidia-modeset
      - /dev/nvidia-uvm:/dev/nvidia-uvm
      - /dev/nvidia-uvm-tools:/dev/nvidia-uvm-tools

  # Build-only service for the TCD tree-cover inference image. The processor
  # never runs this via compose — it launches `deadtrees-tcd:latest` ad-hoc
  # through the mounted Docker socket. Declaring it here makes the image part of
  # the standard deploy build (`docker compose build processor tcd`) so it is
  # rebuilt from version control and can't drift onto a stale (e.g. wrong-CUDA,
  # CPU-only) image. The `build` profile keeps it out of `docker compose up`.
  tcd:
    image: deadtrees-tcd:latest
    profiles: ["build"]
    build:
      context: ./processor/src/treecover_segmentation_oam_tcd
      dockerfile: Dockerfile
