version: 2
updates:
  # Frontend app dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      npm-patch:
        update-types: ["patch"]
      npm-minor:
        update-types: ["minor"]
    ignore:
      # React 19 and the Vite 8 toolchain need coordinated migrations.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "antd"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@ant-design/icons"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@geoapify/geocoder-autocomplete"
        update-types: ["version-update:semver-major"]
      - dependency-name: "unzipit"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
      - dependency-name: "geotiff"
        update-types: ["version-update:semver-major"]
      - dependency-name: "match-sorter"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-player"
        update-types: ["version-update:semver-major"]

      # Tooling majors should be reviewed as explicit maintenance work.
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/eslint-plugin"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@typescript-eslint/parser"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-react-refresh"
        update-types: ["version-update:semver-minor"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions-all:
        patterns: ["*"]

  # Python services and developer CLI
  - package-ecosystem: "pip"
    directories:
      - "/api"
      - "/processor"
      - "/deadtrees-cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      compatibility-patches:
        patterns:
          - "numpy"
          - "rasterio"
          - "open-clip-torch"
          - "segmentation-models-pytorch"
          - "transformers"
        update-types: ["patch"]
      python-safe-updates:
        patterns: ["*"]
        exclude-patterns:
          - "numpy"
          - "rasterio"
          - "torch"
          - "torchvision"
          - "open-clip-torch"
          - "segmentation-models-pytorch"
          - "transformers"
        update-types: ["patch", "minor"]
    ignore:
      # These packages define the geospatial/model compatibility envelope.
      # Patch releases stay grouped above; feature-line upgrades are explicit
      # maintenance work with processor/API image and checkpoint validation.
      - dependency-name: "numpy"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "rasterio"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      # PyTorch and Torchvision are a tested pair. Dependabot groups do not
      # guarantee that both packages have an update in the same run.
      - dependency-name: "torch"
      - dependency-name: "torchvision"
      - dependency-name: "open-clip-torch"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "segmentation-models-pytorch"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
      - dependency-name: "transformers"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"

  # Pinned GDAL runtime images
  - package-ecosystem: "docker"
    directories:
      - "/api"
      - "/processor"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    groups:
      service-base-images:
        patterns: ["*"]
    ignore:
      # A GDAL feature-line change can also change Ubuntu/Python and therefore
      # the available PyTorch wheels. Allow patch/digest refreshes only.
      - dependency-name: "osgeo/gdal"
        update-types:
          - "version-update:semver-minor"
          - "version-update:semver-major"
