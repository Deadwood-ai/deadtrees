name: Frontend Deploy Preview

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-hosting-merge.yml"
      - ".github/workflows/frontend-hosting-pull-request.yml"

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - name: Install Playwright Chromium
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
        timeout-minutes: 8
        run: npx playwright install --with-deps chromium
      - name: Run data factory smoke
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
        timeout-minutes: 8
        env:
          VITE_MODE: production
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SAM_API_URL: ${{ secrets.VITE_SAM_API_URL }}
          VITE_POSTHOG_PROJECT_KEY: ${{ secrets.VITE_POSTHOG_PROJECT_KEY }}
          VITE_POSTHOG_API_HOST: ${{ vars.VITE_POSTHOG_API_HOST }}
          VITE_GEOPIFY_KEY: ${{ secrets.VITE_GEOPIFY_KEY }}
          VITE_SUPABASE_SENTINEL_PROCESSING_URL: ${{ secrets.VITE_SUPABASE_SENTINEL_PROCESSING_URL }}
          VITE_SUPABASE_SENTINEL_PROCESSING_ANON_KEY: ${{ secrets.VITE_SUPABASE_SENTINEL_PROCESSING_ANON_KEY }}
        run: npm run test:e2e

      - name: Compute Firebase preview channel
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
        id: firebase-channel
        run: |
          raw="pr${{ github.event.pull_request.number }}-${{ github.head_ref }}"
          channel="$(printf '%s' "$raw" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9-]+/-/g; s/^-+|-+$//g' | cut -c1-30)"
          if [ -z "$channel" ]; then
            channel="pr${{ github.event.pull_request.number }}"
          fi
          echo "channel=$channel" >> "$GITHUB_OUTPUT"
      - name: Deploy to Firebase Hosting preview
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
        id: firebase-preview
        continue-on-error: true
        env:
          VITE_MODE: production
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SAM_API_URL: ${{ secrets.VITE_SAM_API_URL }}
          VITE_POSTHOG_PROJECT_KEY: ${{ secrets.VITE_POSTHOG_PROJECT_KEY }}
          VITE_POSTHOG_API_HOST: ${{ vars.VITE_POSTHOG_API_HOST }}
          VITE_GEOPIFY_KEY: ${{ secrets.VITE_GEOPIFY_KEY }}
          VITE_SUPABASE_SENTINEL_PROCESSING_URL: ${{ secrets.VITE_SUPABASE_SENTINEL_PROCESSING_URL }}
          VITE_SUPABASE_SENTINEL_PROCESSING_ANON_KEY: ${{ secrets.VITE_SUPABASE_SENTINEL_PROCESSING_ANON_KEY }}
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEADWOOD_D4A4B }}
          FIREBASE_AUTH_MODE: access-token
          FIREBASE_PROJECT_ID: deadwood-d4a4b
          FIREBASE_TOOLS_VERSION: 15.22.2
          FIREBASE_CHANNEL_ID: ${{ steps.firebase-channel.outputs.channel }}
        run: ../.github/scripts/firebase-hosting-deploy.sh preview
      - name: Comment Firebase preview URL
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository && steps.firebase-preview.outputs.preview_url != '' }}
        uses: actions/github-script@v9
        with:
          script: |
            const marker = "<!-- deadtrees-frontend-preview -->";
            const previewUrl = "${{ steps.firebase-preview.outputs.preview_url }}";
            const body = [
              marker,
              "### Frontend preview",
              "",
              `[Open Firebase preview](${previewUrl})`,
              "",
              "Channel: `${{ steps.firebase-channel.outputs.channel }}`",
              "Commit: `${{ github.event.pull_request.head.sha }}`",
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
      - name: Warn when Firebase preview deploy fails
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository && steps.firebase-preview.outcome == 'failure' }}
        run: |
          echo "::warning::Firebase preview deploy failed after retry. Frontend CI remains blocking; preview hosting is non-blocking for PRs because Firebase token exchange can fail independently of the code build."
