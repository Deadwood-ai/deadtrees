name: Frontend Deploy Preview

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-hosting-merge.yml"
      - ".github/workflows/frontend-hosting-pull-request.yml"

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  frontend-ci:
    name: frontend-ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - run: npm ci
      - run: npm test
      - run: npm run lint
      - run: npm run build
      - name: Install Playwright Chromium
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
        timeout-minutes: 8
        run: npx playwright install --with-deps chromium
      - name: Run data factory smoke
        if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
        timeout-minutes: 8
        env:
          VITE_MODE: production
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SAM_API_URL: ${{ secrets.VITE_SAM_API_URL }}
          VITE_POSTHOG_PROJECT_KEY: ${{ secrets.VITE_POSTHOG_PROJECT_KEY }}
          VITE_GEOPIFY_KEY: ${{ secrets.VITE_GEOPIFY_KEY }}
          VITE_SUPABASE_SENTINEL_PROCESSING_URL: ${{ secrets.VITE_SUPABASE_SENTINEL_PROCESSING_URL }}
          VITE_SUPABASE_SENTINEL_PROCESSING_ANON_KEY: ${{ secrets.VITE_SUPABASE_SENTINEL_PROCESSING_ANON_KEY }}
        run: npm run test:e2e

  frontend-preview:
    name: frontend-preview
    if: ${{ github.event.pull_request.user.login != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    needs:
      - frontend-ci
    defaults:
      run:
        working-directory: frontend
    env:
      VITE_MODE: production
      VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      VITE_SAM_API_URL: ${{ secrets.VITE_SAM_API_URL }}
      VITE_POSTHOG_PROJECT_KEY: ${{ secrets.VITE_POSTHOG_PROJECT_KEY }}
      VITE_GEOPIFY_KEY: ${{ secrets.VITE_GEOPIFY_KEY }}
      VITE_SUPABASE_SENTINEL_PROCESSING_URL: ${{ secrets.VITE_SUPABASE_SENTINEL_PROCESSING_URL }}
      VITE_SUPABASE_SENTINEL_PROCESSING_ANON_KEY: ${{ secrets.VITE_SUPABASE_SENTINEL_PROCESSING_ANON_KEY }}
    steps:
      - uses: actions/checkout@v6
      - run: npm ci
      - id: firebase-preview-deploy
        uses: FirebaseExtended/action-hosting-deploy@v0
        continue-on-error: true
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEADWOOD_D4A4B }}
          projectId: deadwood-d4a4b
          entryPoint: frontend
          firebaseToolsVersion: 15.22.2
      - name: Retry Firebase preview deploy
        id: firebase-preview-retry
        if: ${{ steps.firebase-preview-deploy.outcome == 'failure' }}
        uses: FirebaseExtended/action-hosting-deploy@v0
        continue-on-error: true
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DEADWOOD_D4A4B }}
          projectId: deadwood-d4a4b
          entryPoint: frontend
          firebaseToolsVersion: 15.22.2
      - name: Warn when Firebase preview deploy is unavailable
        if: ${{ steps.firebase-preview-deploy.outcome == 'failure' && steps.firebase-preview-retry.outcome == 'failure' }}
        run: |
          echo "::warning::Firebase preview deploy failed after retry. Frontend CI remains blocking; preview hosting is non-blocking for PRs because Firebase token exchange can fail independently of the code build."
